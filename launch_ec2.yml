---
- name: Launch AWS EC2 Instance
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    aws_region: us-east-2
    ami_id: ami-09804e43d839edb4e
    subnet_id: subnet-0f3359e8e5b87a700
    security_group: sg-0b8114239506ed046
    existing_keypair: RADHAK

  tasks:

    - name: Create EC2 instance
      amazon.aws.ec2_instance:
        name: awx-demo-server

        region: "{{ aws_region }}"
        image_id: "{{ ami_id }}"
        instance_type: t3.medium
        key_name: "{{ existing_keypair }}"

        wait: yes

        network:
          assign_public_ip: true

        vpc_subnet_id: "{{ subnet_id }}"

        security_groups:
          - "{{ security_group }}"

        volumes:
          - device_name: /dev/sda1
            ebs:
              volume_size: 30
              volume_type: gp3
              delete_on_termination: true

        tags:
          Environment: Testing
          CreatedBy: AWX

      register: ec2

    - debug:
        var: ec2.instances
