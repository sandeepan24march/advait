---
- name: Create VM on KVM Server (154.205.1.2) from existing template
  hosts: all   # Use AWX "Limit" at launch time to scope to 154.205.1.2 only
  become: yes

  vars:
    vm_name: "kital_ph_pri"            # <-- CHANGE per VM you create
    vm_ram_mb: 8192
    vm_vcpus: 4
    vm_sockets: 1
    vm_cores: 4
    vm_threads: 1
    vm_ip: "154.205.1.7"              # <-- CHANGE per VM (confirm free IP first)
    vm_netmask: "255.255.255.128"
    vm_gateway: "154.205.1.126"          # <-- confirm actual gateway for this subnet
    vm_network_bridge: "mgmtbridge"            # <-- confirm actual bridge name: `ip link` / `brctl show` on 154.205.1.2
    vm_sriov_network: "sr-iov-port2"    # <-- second NIC: libvirt SR-IOV pool network name
    template_image_path: "/home/Cataleya_VM/Template/rocky8_10_node300_May12.qcow2"
    vm_storage_path: "/home/Cataleya_VM/kital_ph_pri/"
    vm_image_path: "{{ vm_storage_path }}/{{ vm_name }}.qcow2"
    vm_os_variant: "rhel8.0"            # or "rocky8" if registered - check: osinfo-query os | grep -i rocky

  tasks:

    # -------------------------------------------------------
    # PRE-CHECKS
    # -------------------------------------------------------

    - name: Create VM storage directory if not exists
      file:
        path: "{{ vm_storage_path }}"
        state: directory
        mode: '0755'
        owner: root
        group: root

    - name: Check if VM already exists
      command: virsh dominfo {{ vm_name }}
      register: vm_exists
      ignore_errors: yes

    - name: Stop playbook if VM already exists
      debug:
        msg: "⚠️ VM {{ vm_name }} already exists — stopping"
      when: vm_exists.rc == 0

    - name: End play if VM already exists
      meta: end_play
      when: vm_exists.rc == 0

    # -------------------------------------------------------
    # VERIFY TEMPLATE EXISTS (no download needed - template is local on this host)
    # -------------------------------------------------------

    - name: Verify template qcow2 exists on this host
      stat:
        path: "{{ template_image_path }}"
      register: template_stat

    - name: Fail if template is missing
      fail:
        msg: "Template not found at {{ template_image_path }} on this host"
      when: not template_stat.stat.exists

    # -------------------------------------------------------
    # VERIFY SR-IOV NETWORK EXISTS AND IS ACTIVE
    # -------------------------------------------------------

    - name: Check SR-IOV configured network status
      command: virsh net-info {{ vm_sriov_network }}
      register: sriov_net_check
      ignore_errors: yes

    - name: Fail if SR-IOV network is missing or inactive
      fail:
        msg: "Network '{{ vm_sriov_network }}' not found or not active on this host. Check: virsh net-list --all"
      when: sriov_net_check.rc != 0 or 'Active:         yes' not in sriov_net_check.stdout

    # -------------------------------------------------------
    # PREPARE VM DISK (copy template -> new per-VM disk)
    # -------------------------------------------------------

    - name: Copy template image for new VM
      copy:
        src: "{{ template_image_path }}"
        dest: "{{ vm_image_path }}"
        remote_src: yes
        mode: '0644'
        owner: root
        group: root

    - name: Verify disk ownership
      command: ls -lh {{ vm_image_path }}
      register: ownership_check

    - name: Show disk ownership
      debug:
        msg: "{{ ownership_check.stdout }}"

    # -------------------------------------------------------
    # CONFIGURE STATIC IP & HOSTNAME
    # -------------------------------------------------------

    - name: Set hostname and static IP on VM image
      shell: |
        virt-customize -a {{ vm_image_path }} \
          --hostname {{ vm_name }} \
          --run-command 'cat > /etc/sysconfig/network-scripts/ifcfg-eth0 << EOF
        TYPE=Ethernet
        BOOTPROTO=static
        NAME=eth0
        DEVICE=eth0
        ONBOOT=yes
        IPADDR={{ vm_ip }}
        NETMASK={{ vm_netmask }}
        GATEWAY={{ vm_gateway }}
        DNS1=98.158.111.2
        EOF' \
          --selinux-relabel

    # -------------------------------------------------------
    # CREATE VM (NIC1 = mgmt bridge, NIC2 = SR-IOV port, no IP, model e1000e)
    # -------------------------------------------------------

    - name: Create VM using virt-install
      command: >
        virt-install
        --name {{ vm_name }}
        --ram {{ vm_ram_mb }}
        --cpu host
        --vcpus {{ vm_vcpus }},sockets={{ vm_sockets }},cores={{ vm_cores }},threads={{ vm_threads }}
        --disk path={{ vm_image_path }},format=qcow2,bus=virtio
        --import
        --os-variant {{ vm_os_variant }}
        --network bridge={{ vm_network_bridge }},model=virtio
        --network network={{ vm_sriov_network }},model=e1000e
        --graphics spice
        --video vga
        --noautoconsole
        --autostart

    # -------------------------------------------------------
    # POST CHECKS
    # -------------------------------------------------------

    - name: Wait for VM to boot
      pause:
        seconds: 30
        prompt: "Waiting 30 seconds for VM to boot..."

    - name: Check VM state
      command: virsh domstate {{ vm_name }}
      register: vm_state

    - name: Get VM info
      command: virsh dominfo {{ vm_name }}
      register: vm_info

    - name: Get VM IP
      command: virsh domifaddr {{ vm_name }}
      register: vm_ip_out
      ignore_errors: yes

    - name: Get VM attached NICs
      command: virsh domiflist {{ vm_name }}
      register: vm_nic_list
      ignore_errors: yes

    - name: Final summary
      debug:
        msg:
          - "============================================"
          - "✅ VM Created Successfully!"
          - "============================================"
          - "VM Name  : {{ vm_name }}"
          - "VM IP    : {{ vm_ip }}"
          - "Gateway  : {{ vm_gateway }}"
          - "Netmask  : {{ vm_netmask }}"
          - "NIC 1    : {{ vm_network_bridge }} (bridge, virtio)"
          - "NIC 2    : {{ vm_sriov_network }} (SR-IOV, model e1000e, no IP assigned)"
          - "CPU      : {{ vm_sockets }}S/{{ vm_cores }}C/{{ vm_threads }}T"
          - "RAM      : {{ vm_ram_mb }} MB"
          - "Disk     : {{ vm_image_path }}"
          - "Template : {{ template_image_path }}"
          - "State    : {{ vm_state.stdout }}"
          - "NIC List : {{ vm_nic_list.stdout }}"
          - "============================================"
